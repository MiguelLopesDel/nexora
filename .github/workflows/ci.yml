name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    # Fedora ships gtk4-layer-shell; Ubuntu LTS (24.04) does not yet.
    container: fedora:latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        # gcc-c++/cmake build the vendored whisper.cpp; clang-devel provides
        # the libclang that bindgen needs for its generated bindings.
        run: dnf install -y gcc gcc-c++ cmake clang-devel gtk4-devel gtk4-layer-shell-devel openssl-devel curl tar xz vulkan-loader-devel glslc

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Tests
        run: cargo test

      - name: Release build
        run: cargo build --release

      - name: Binary size report
        run: ls -lh target/release/nexora
