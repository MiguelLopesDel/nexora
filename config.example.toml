# Nexora configuration — lives at ~/.config/nexora/config.toml
# Keep this file private (chmod 600) if you put API keys in it;
# prefer api_key_env so secrets stay in your environment.

[general]
# Ask the compositor to hide Nexora from screen capture (Hyprland/niri only, see README).
hidden = true
# Hyprland window-rule keyword for anti-capture. The token varies by Hyprland
# version/fork ("no_screen_share", "noscreenshare", …). Run `nexora hidden status`
# and check your Hyprland docs if hiding doesn't take effect.
hyprland_rule = "no_screen_share"
# Overlay via layer-shell: "auto" (use when supported), "on", "off" (plain window).
layer_shell = "auto"
width = 820
height = 560

# ------------------------------------------------------------------
# Providers — "kind" selects the wire protocol:
#   anthropic  → Anthropic Messages API
#   openai     → any OpenAI-compatible API (OpenAI, OpenRouter,
#                DeepSeek, Gemini compat endpoint, Ollama, llama.cpp…)
# ------------------------------------------------------------------

[providers.anthropic]
kind = "anthropic"
api_key_env = "ANTHROPIC_API_KEY"
default_model = "claude-sonnet-4-6"

[providers.openai]
kind = "openai"
api_key_env = "OPENAI_API_KEY"
default_model = "gpt-5-mini"
# Optional on supported models. Higher levels can consume more billed output
# tokens and add latency. Use "none" to disable reasoning where supported.
# reasoning_effort = "low" # none, low, medium, high, xhigh, max

[providers.openrouter]
kind = "openai"
base_url = "https://openrouter.ai/api/v1"
api_key_env = "OPENROUTER_API_KEY"
default_model = "~openai/gpt-latest"

[providers.deepseek]
kind = "openai"
base_url = "https://api.deepseek.com/v1"
api_key_env = "DEEPSEEK_API_KEY"
default_model = "deepseek-v4-flash"
thinking = true
# DeepSeek V4 supports only "high" and "max". It maps low/medium to high.
# Thinking tokens are part of billed output usage.
reasoning_effort = "high"

[providers.gemini]
kind = "openai"
base_url = "https://generativelanguage.googleapis.com/v1beta/openai"
api_key_env = "GEMINI_API_KEY"
default_model = "gemini-3.5-flash"

[providers.ollama]
kind = "openai"
base_url = "http://localhost:11434/v1"
api_key = "ollama" # Ollama ignores the key but the field must be set
default_model = "llama3.2"

# ------------------------------------------------------------------
# Tasks — pick a provider+model per job. "ask" is the default task.
# ------------------------------------------------------------------

[tasks.ask]
provider = "anthropic"
model = "claude-sonnet-4-6"
system = "You are Nexora, a concise on-screen assistant. Answer briefly and directly."

[tasks.explain-screen]
provider = "anthropic"
model = "claude-sonnet-4-6"
max_tokens = 1024

# ------------------------------------------------------------------
# Presets — fire with `nexora run <name>` (bind them to keys in your
# compositor). "explain-screen" is built in, but can be overridden.
# ------------------------------------------------------------------

[presets.explain-screen]
prompt = "Explain what is on my screen. Focus on unusual terms, errors, and anything I would want clarified."
attach_screen = true
task = "explain-screen"

[presets.translate-screen]
prompt = "Translate the text on my screen to Brazilian Portuguese. Only output the translation."
attach_screen = true
task = "explain-screen"

# ------------------------------------------------------------------
# Live meeting assistant — every option is also available under ⚙.
# `parec` is used for lightweight PulseAudio/PipeWire-compatible capture.
# ------------------------------------------------------------------

[meeting]
audio_source = "system" # "system", "microphone", "both", or "custom"
audio_device = ""       # Pulse source name for "custom"
chunk_seconds = 2
# Local Whisper analyzes a rolling 4-second window every 2 seconds. The overlap
# preserves words split at capture boundaries without delaying every update 4s.
transcription_window_seconds = 4
# Wait briefly for speech still being transcribed before a manual question is
# sent. Set 0 for the lowest latency; increase for more complete live context.
question_context_wait_ms = 1200
# Character budget sent with manual questions. Nexora keeps the full local
# transcript and fills this budget with recent + question-relevant older speech.
question_context_chars = 12000
# Skip near-silent PCM chunks before upload. Set 0 to disable the local gate.
silence_threshold = 180
# "local" transcribes with whisper.cpp on this computer (default; audio never
# leaves the machine). "remote" uploads each chunk to the provider below.
transcription_backend = "local"
# Curated whisper.cpp checkpoint for the local backend. Download it in
# Settings → Live meeting: tiny, base, small, or large-v3-turbo-q5_0.
whisper_model = "base"
# "auto" prefers GPU when this Nexora build includes a GPU backend; "gpu"
# refuses to start without one; "cpu" always disables GPU acceleration.
transcription_compute = "auto"
# Used only when transcription_backend = "remote".
transcription_provider = "openai"
transcription_model = "gpt-4o-mini-transcribe"
input_language = ""     # blank = automatic detection
translate = false
target_language = "Portuguese (Brazil)"
suggestions = true
objection_handling = true
automatic_notes = true
screen_context = false
screen_interval_chunks = 3
summary = true
save_session = true
analysis_task = "ask"
profile = "general"

# ------------------------------------------------------------------
# Screen understanding — "direct" sends screenshots to the analysis
# model. "proxy" first asks a separate vision/OCR model for a compact
# textual description, which lets text-only models such as DeepSeek use it.
# Local downloads in the UI use Ollama's model registry.
# ------------------------------------------------------------------

[vision]
mode = "direct" # "direct", "proxy", or "off"
provider = "ollama"
model = "qwen3-vl:4b"
ollama_url = "http://localhost:11434"
prompt = "Describe the visible screen for another AI. Extract important text with OCR, application names, errors, numbers, UI state, and conversation-relevant details. Be factual and compact; do not guess hidden content."

[profiles.general]
system = "You are a discreet live meeting coach. Be concise, practical, truthful, and never invent facts."

[profiles.interview]
system = "Coach the user during an interview. Suggest concise STAR-style answers and useful clarifying questions."

[profiles.sales]
system = "Coach a consultative sales call. Identify needs, suggest value-based replies, and handle objections without pressure."

[profiles.study]
system = "Act as a study coach. Clarify concepts, flag uncertainty, and produce useful notes."

[profiles.presentation]
system = "Coach a live presentation. Suggest crisp explanations, transitions, and responses to audience questions."

[profiles.programming]
system = "Act as a programming copilot. Focus on accurate technical explanations, debugging steps, and concise code guidance."
